<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style.css"> <!-- Enlace al archivo CSS externo -->
    <link rel="shortcut icon" href="../assets/img/urbanStyle_logo.png" type="image/x-icon"> <!-- Enlace al favicon -->

    <title>Contacto - Urban Style Clothing</title>
</head>

<body>

    <header> <!-- Encabezado de página -->
        <h1>Urban Style Clothing</h1> <!-- Nombre de la tienda -->
    </header>

    <nav> <!-- Barra de navegación -->
        <ul>
            <li><a href="../index.html" target="_self">Inicio</a></li>
            <li><a href="./servicios.html" target="_self">Servicios/Productos</a></li>
            <li><a href="./equipo.html" target="_self">Equipo/Sobre Nosotros</a></li>
            <li><a href="./pedido.html" target="_self">Pedido Online</a></li>
            <li><a href="./contacto.html" target="_self">Contacto</a></li>
            <li><a href="./faq.html" target="_self">Preguntas Frecuentes</a></li>
        </ul>
    </nav>

    <main> <!-- Contenido principal -->

        <section class="contacto-section">

            <h2>Contactanos</h2>
            <p class="subtitulo">¿Tenés alguna consulta? Completá el formulario y te respondemos a la brevedad.</p>

            <form action="#" method="post"> <!-- Formulario de contacto -->

                <div class="form-fila"> <!-- Fila: nombre y apellido lado a lado -->

                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
                    </div>

                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Escribí tu consulta acá..." required></textarea>
                </div>

                <div class="form-botones"> <!-- Botones de envío y reset -->
                    <button type="submit" class="btn-enviar">Enviar mensaje</button>
                    <button type="reset" class="btn-reset">Limpiar</button>
                </div>

            </form>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Urban Style Clothing. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
