<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Registro</title>
    <meta name="description" content="Cine Aurora - Registro" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>
      <div class="header-logo">
        <h1>Cine Aurora</h1>
        <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
      </div>
      <div>
        <nav>
          <a href="../index.html">Inicio</a>
          <a href="./estrenos.html">Próximos estrenos</a>
          <a href="../index.html">Volver</a>
        </nav>
      </div>
    </header>

    <main class="registro-main">
      <form class="registro-form" action="login.html">
        <h2>Crear nueva cuenta</h2>

        <!-- Datos personales -->
        <div class="form-grupo">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" placeholder="Juan Pérez" required />
        </div>

        <div class="form-grupo">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tucorreo@email.com" required />
        </div>

        <div class="form-grupo">
          <label for="fecha-nacimiento">Fecha de nacimiento</label>
          <input type="date" id="fecha-nacimiento" required />
        </div>

        <div class="form-grupo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <div class="form-grupo">
          <label for="confirmar-password">Confirmar contraseña</label>
          <input type="password" id="confirmar-password" placeholder="••••••••" required />
        </div>

        <hr class="registro-separador" />

        <!-- Datos opcionales -->
        <div class="registro-extra">
          <div class="extra-titulo">
            <h3>Datos para ayudar al cine</h3>
            <p>Estos datos nos ayudan a mejorar tu experiencia.</p>
          </div>

          <div class="extra-campos">

            <div class="form-grupo">
              <label for="color-butaca">Elegí tu color favorito para las butacas</label>
              <input type="color" id="color-butaca" />
            </div>

            <div class="form-grupo">
              <label for="entradas">¿Cuántas entradas comprás en general? Min: 0 | Max: 10</label>
              <input type="range" id="entradas" min="0" max="10" />
            </div>

            <div class="form-grupo">
              <label for="genero">Seleccioná tu género favorito</label>
              <select id="genero">
                <option>Acción</option>
                <option>Drama</option>
                <option>Ciencia ficción</option>
                <option>Terror</option>
                <option>Comedia</option>
                <option>Romance</option>
              </select>
            </div>

            <div class="form-grupo">
              <label>Elegí tu snack favorito</label>
              <div class="radio-grupo">
                <label class="radio-opcion">
                  <input type="radio" name="snack" value="dulce" />
                  Pochoclo dulce
                </label>
                <label class="radio-opcion">
                  <input type="radio" name="snack" value="salado" />
                  Pochoclo salado
                </label>
                <label class="radio-opcion">
                  <input type="radio" name="snack" value="chocolate" />
                  Chocolate
                </label>
                <label class="radio-opcion">
                  <input type="radio" name="snack" value="frutos" />
                  Frutos secos
                </label>
              </div>
            </div>

          </div>
        </div>

        <button type="submit" class="btn-registro">Regístrate</button>

      </form>
    </main>

    <footer>
      <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
  </body>
</html>
