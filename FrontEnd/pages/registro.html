    <main class="registro-main">
      <form class="registro-form" action="login.html">
        <h2>Crear nueva cuenta</h2>

        <!-- Datos personales -->
        <div class="form-grupo">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" placeholder="Juan Pérez" required />
        </div>

        <div class="form-grupo">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tucorreo@email.com" required />
        </div>

        <div class="form-grupo">
          <label for="fecha-nacimiento">Fecha de nacimiento</label>
          <input type="date" id="fecha-nacimiento" required />
        </div>

        <div class="form-grupo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <div class="form-grupo">
          <label for="confirmar-password">Confirmar contraseña</label>
          <input type="password" id="confirmar-password" placeholder="••••••••" required />
        </div>
      


      <button class="btn-registro" type="submit">Regístrate</button>

      </form>
    </main>
